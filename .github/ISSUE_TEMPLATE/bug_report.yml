name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Do **not** use this for security issues — see [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What you saw vs what you expected.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign in with PIN
        2. Enter amount, tap Charge
        3. ...
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Stripe mode
      options:
        - Test (simulated reader)
        - Test (physical reader)
        - Live
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or release (optional)
      placeholder: main @ abc1234, or deployed URL

  - type: textarea
    id: logs
    attributes:
      label: Errors / logs (optional)
      description: Browser console, API response, or Stripe Dashboard error — no secrets or keys.
